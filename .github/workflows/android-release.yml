name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: StakeNBakeMobile/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: StakeNBakeMobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JS deps
        working-directory: StakeNBakeMobile
        run: npm ci

      - name: Build release APK
        run: ./gradlew clean :app:assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: StakeNBakeMobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
