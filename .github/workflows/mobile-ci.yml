name: mobile-ci

on:
  push:
    branches: [main]
    paths:
      - 'StakeNBakeMobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'StakeNBakeMobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StakeNBakeMobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: StakeNBakeMobile/package-lock.json

      - name: Install JS deps
        run: npm install

      - name: Typecheck
        run: npm exec tsc -- --noEmit

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stakeNbake-debug-apk
          path: StakeNBakeMobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Generate CI changelog
        working-directory: .
        run: |
          mkdir -p artifacts
          {
            echo "StakeNBake Mobile CI Build"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Workflow Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "Commit: $GITHUB_SHA"
            echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            echo "Recent commits:"
            git log -n 20 --pretty=format:'- %h %s (%ad)' --date=short
          } > artifacts/ci-changelog.txt

      - name: Upload CI changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-changelog
          path: artifacts/ci-changelog.txt
          if-no-files-found: error
