<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile Staking Toolkit Legal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071317;
      --panel: #0d2026;
      --text: #e8fbff;
      --muted: #93b7bf;
      --accent: #7ff7f0;
      --border: #1d3f47;
    }
    body {
      margin: 0;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #10313a 0%, var(--bg) 55%);
      color: var(--text);
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 72px;
    }
    .card {
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }
    p, li {
      color: var(--muted);
    }
    a {
      color: var(--accent);
    }
    ul {
      margin: 16px 0 0 20px;
      padding: 0;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Mobile Staking Toolkit Legal Pages</h1>
      <p>Public legal documents for store submission and user access.</p>
      <ul>
        <li><a href="./privacy.html">Privacy Policy</a></li>
        <li><a href="./terms.html">Terms &amp; Conditions</a></li>
        <li><a href="./license.html">License</a></li>
        <li><a href="./copyright.html">Copyright</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
